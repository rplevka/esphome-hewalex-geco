; Top-level PlatformIO entry point for the PlatformIO IDE / `pio` CLI.
;
; This project is primarily an ESPHome project (see hewalex-zps.yaml).
; ESPHome generates a complete PlatformIO project under .esphome/build/<name>/
; whenever you run `esphome compile`. This file mirrors the env that ESPHome
; emits and re-points src/build/scripts at that generated tree, so PlatformIO
; can be opened at the repo root.
;
; Workflow:
;   1) Generate sources (run once, and again whenever YAML or component files change):
;        esphome compile hewalex-zps.yaml
;   2) Build / upload / monitor from the repo root:
;        pio run
;        pio run -t upload
;        pio device monitor
;
; Notes:
; - The env name `hewalex-zps` matches the `esphome.name` in hewalex-zps.yaml.
;   If you rename the device, also rename the env and the .esphome/build/<name>
;   path references below.
; - Edit C++ component sources under components/hewalex_geco/ — those are the
;   tracked originals. ESPHome copies them into .esphome/build/.../src/esphome/
;   components/hewalex_geco/ at compile time.

[platformio]
default_envs = hewalex-zps
src_dir = .esphome/build/hewalex-zps/src
build_dir = .esphome/build/hewalex-zps/.pioenvs

[env:hewalex-zps]
platform = platformio/espressif8266@4.2.1
platform_packages =
    platformio/framework-arduinoespressif8266@~3.30102.0
framework = arduino
board = d1_mini
board_build.flash_mode = dout
board_build.ldscript = eagle.flash.4m.ld
build_flags =
    -DESPHOME_LOG_LEVEL=ESPHOME_LOG_LEVEL_DEBUG
    -DNEW_OOM_ABORT
    -DPIO_FRAMEWORK_ARDUINO_LWIP2_HIGHER_BANDWIDTH_LOW_FLASH
    -DUSE_ARDUINO
    -DUSE_ESP8266
    -DUSE_ESP8266_FRAMEWORK_ARDUINO
    -DUSE_ESP8266_WAVEFORM_STUBS
    -DUSE_STORE_LOG_STR_IN_FLASH
    -Wl,--wrap=fprintf
    -Wl,--wrap=printf
    -Wl,--wrap=vprintf
    -Wno-nonnull-compare
    -Wno-sign-compare
    -Wno-unused-but-set-variable
    -Wno-unused-variable
    -fno-exceptions
    -std=gnu++20
build_unflags =
    -std=gnu++11
    -std=gnu++14
    -std=gnu++17
    -std=gnu++23
    -std=gnu++2a
    -std=gnu++2b
    -std=gnu++2c
extra_scripts =
    pre:.esphome/build/hewalex-zps/testing_mode.py
    pre:.esphome/build/hewalex-zps/exclude_updater.py
    pre:.esphome/build/hewalex-zps/exclude_waveform.py
    pre:.esphome/build/hewalex-zps/remove_float_scanf.py
    pre:.esphome/build/hewalex-zps/cxx_flags.py
    post:.esphome/build/hewalex-zps/post_build.py
lib_deps =
    ESP32Async/ESPAsyncTCP@2.0.0
    ESP8266WiFi
    ESP32Async/ESPAsyncWebServer@3.9.6
    DNSServer
    ESP8266mDNS
lib_ldf_mode = off
lib_compat_mode = strict
